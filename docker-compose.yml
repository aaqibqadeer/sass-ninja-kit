# Local development services for ninjakit.
#
# ONLY RELEVANT IF DB_PROVIDER=mongodb.
# This file provides a local MongoDB instance for the MongoDB adapter
# (lib/db/mongodb). If you chose Supabase (DB_PROVIDER=supabase), you don't need
# this — use the Supabase CLI instead (`supabase start`), see
# docs/guides/choosing-database.md. On a Supabase-only fork this file can be
# deleted (delete-what-you-don't-use, CLAUDE.md §1.5).
#
# Usage:
#   docker compose up -d mongo     # start MongoDB on localhost:27017
#   docker compose down            # stop it (add -v to also drop the data volume)
#
# Then set in .env.local:
#   DB_PROVIDER=mongodb
#   MONGODB_URI=mongodb://localhost:27017/ninjakit

services:
  mongo:
    image: mongo:7
    container_name: ninjakit-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    # No auth is configured for local dev convenience. Do NOT use this compose
    # file for anything internet-facing; production Mongo lives elsewhere.

volumes:
  mongo-data:
